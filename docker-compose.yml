services:
  cypress:
    build: .
    volumes:
      - ./:/e2e
      - ./cypress/results:/e2e/cypress/results
      - ./cypress/report:/e2e/cypress/report
    environment:
      - CYPRESS_ENV=ci
      - CYPRESS_BASEURL=http://host.docker.internal:3000
    network_mode: host
    command: ["npm", "run", "cypress:run"]
